<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YGyML Web App</title>
<style>
/* Embedded CSS styles */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background-color: #001F3F; /* Navy */
  color: #fff;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: #001F3F;
  padding: 10px 20px;
  position: relative;
}
.header-left {
  font-size: 1.5rem;
  font-weight: bold;
}
.nav-icons {
  display: flex;
  gap: 10px;
}
.nav-btn {
  font-size: 1.5rem;
  background: none;
  border: none;
  cursor: pointer;
  color: #F5F5DC;
}
.profile-icon {
  position: relative;
  font-size: 1.5rem;
  cursor: pointer;
}
#profileDropdown {
  display: none;
  position: absolute;
  right: 0;
  top: 25px;
  background-color: #F5F5DC;
  color: #000;
  min-width: 120px;
  border-radius: 4px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
  flex-direction: column;
  z-index: 1;
}
#profileDropdown button {
  padding: 10px;
  width: 100%;
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
}
#profileDropdown button:hover {
  background-color: #ddd;
}
main {
  padding: 20px;
}
.section {
  display: none;
}
.section.active {
  display: block;
}
button {
  background-color: #F5F5DC;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}
button:hover {
  opacity: 0.9;
}
.post {
  background-color: #fff;
  color: #000;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
.add-to-wishlist {
  background-color: transparent;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
}
.home-icon {
  background: none;
  border: none;
  font-size: 2rem;
  cursor: pointer;
  margin-top: 20px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}
.gym-image {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 20px auto;
}
</style>
</head>
<body>
<header>
  <div class="header-left">YGyML</div>
  <div class="wishlist-icon" title="Wishlist">❤️</div>
  <nav class="nav-icons">
    <button class="nav-btn" data-section="home" title="Home">🏠</button>
    <button class="nav-btn" data-section="meal" title="Meal Plan">🍽️</button>
    <button class="nav-btn" data-section="workout" title="Workout Plan">🏋️‍♂️</button>
    <button class="nav-btn" data-section="posts" title="Training Posts">📝</button>
  </nav>
  <div class="profile-icon" id="profileIcon" title="Profile">
    👤
    <div id="profileDropdown" class="dropdown-content">
      <button id="signInBtn">Sign In</button>
      <button id="signOutBtn" style="display:none;">Sign Out</button>
    </div>
  </div>
</header>

<main>
  <section id="home-section" class="section active">
    <h2>YGyML</h2>
    <img src="https://images.unsplash.com/photo-1596215432304-0c8a8f7d0b07" alt="Gym Equipment" class="gym-image" />
  </section>

  <section id="meal-section" class="section">
    <h2>Meal Plan</h2>
    <button class="meal-option" data-plan="lose">Lose Fat</button>
    <button class="meal-option" data-plan="gain">Gain Fat</button>
    <button class="meal-option" data-plan="build">Build Muscle</button>
    <div id="mealPlanDetails"></div>
    <button class="home-icon" data-section="home" title="Home">🏠</button>
  </section>

  <section id="workout-section" class="section">
    <h2>Workout Plan</h2>
    <button class="workout-option" data-type="lose">Lose Fat</button>
    <button class="workout-option" data-type="gain">Gain Muscle</button>
    <div id="workoutDetails"></div>
    <button class="home-icon" data-section="home" title="Home">🏠</button>
  </section>

  <section id="training-posts-section" class="section">
    <h2>Training Posts</h2>
    <div class="post" id="post1">
      <h3>Post 1: Workout Tips</h3>
      <button class="add-to-wishlist" data-post="Post 1">❤️ Add to Wishlist</button>
    </div>
    <div class="post" id="post2">
      <h3>Post 2: Nutrition Advice</h3>
      <button class="add-to-wishlist" data-post="Post 2">❤️ Add to Wishlist</button>
    </div>
    <button class="home-icon" data-section="home" title="Home">🏠</button>
  </section>
</main>

<script>
  // JavaScript code embedded
  // Navigation
  const sections = document.querySelectorAll('.section');
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.onclick = () => {
      const target = btn.dataset.section;
      sections.forEach(sec => {
        sec.classList.toggle('active', sec.id === target + '-section');
      });
    };
  });
  // Home icon in sections
  document.querySelectorAll('.home-icon').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
      document.getElementById('home-section').classList.add('active');
    };
  });
  // Profile dropdown toggle
  const profileIcon = document.getElementById('profileIcon');
  const profileDropdown = document.getElementById('profileDropdown');
  profileIcon.onclick = () => {
    profileDropdown.style.display = profileDropdown.style.display === 'block' ? 'none' : 'block';
  };
  // Sign in/out
  const signInBtn = document.getElementById('signInBtn');
  const signOutBtn = document.getElementById('signOutBtn');
  signInBtn.onclick = () => {
    alert('Signed in!');
    signInBtn.style.display = 'none';
    signOutBtn.style.display = 'block';
  };
  signOutBtn.onclick = () => {
    if (confirm('Sign out?')) {
      alert('Signed out!');
      signInBtn.style.display = 'block';
      signOutBtn.style.display = 'none';
    }
  };
  // Meal options
  document.querySelectorAll('.meal-option').forEach(btn => {
    btn.onclick = () => {
      document.getElementById('mealPlanDetails').innerHTML = `<p>You selected: ${btn.dataset.plan} plan.</p>`;
    };
  });
  // Workout options
  document.querySelectorAll('.workout-option').forEach(btn => {
    btn.onclick = () => {
      document.getElementById('workoutDetails').innerHTML = `<p>You selected: ${btn.dataset.type} workout plan.</p>`;
    };
  });
  // Wishlist buttons
  document.querySelectorAll('.add-to-wishlist').forEach(btn => {
    btn.onclick = () => {
      alert('Added "' + btn.dataset.post + '" to wishlist!');
    };
  });
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('Service Worker registered:', reg))
        .catch(err => console.log('Service Worker registration failed:', err));
    });
  }
</script>
</body>
</html>
