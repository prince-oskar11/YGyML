<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YGyML Web App</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background-color: #001F3F;
  color: beige;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: #001F3F;
  padding: 10px 20px;
}
.header-left {
  font-size: 1.5rem;
  font-weight: bold;
}
.icons-container {
  display: flex;
  align-items: center;
  gap: 15px;
}
.icon {
  width: 24px;
  height: 24px;
  fill: beige;
  cursor: pointer;
}
#installIcon {
  display: none;
}
#dailyPlanIcon {
  display: block;
}
#profileIcon {
  position: relative;
}
#profileDropdown {
  display: none;
  position: absolute;
  right: 0;
  top: 25px;
  background: #F5F5DC;
  color: #000;
  border-radius: 4px;
  box-shadow: 0 0 8px rgba(0,0,0,0.2);
  z-index: 10;
}
#profileDropdown button {
  width: 100%;
  padding: 10px;
  border: none;
  background: none;
  cursor: pointer;
  text-align: left;
}
#profileDropdown button:hover {
  background-color: #ddd;
}
main {
  padding: 20px;
}
section {
  display: none;
}
section.active {
  display: block;
}
button {
  background-color: #F5F5DC;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}
button:hover {
  opacity: 0.9;
}
.post {
  background-color: #fff;
  color: #000;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
.home-icon {
  background: none;
  border: none;
  font-size: 2rem;
  cursor: pointer;
  margin-top: 20px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}
#training-guide {
  margin-top: 20px;
}
#daily-plan {
  margin-top: 20px;
  background: #fff;
  color: #000;
  padding: 10px;
  border-radius: 8px;
}
.exercise-img {
  max-width: 100%;
  height: auto;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}
</style>
</head>
<body>
<header>
  <div class="header-left">YGyML</div>
  <div class="icons-container">
    <svg id="dailyPlanIcon" class="icon" viewBox="0 0 24 24" title="Daily Plan" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H5V8h14v13z"/>
    </svg>
    <svg id="installIcon" class="icon" viewBox="0 0 24 24" title="Install App" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 20h14v-2H5v2zm7-18L5 9h4v6h6V9h4l-7-7z"/>
    </svg>
    <div id="profileIcon" style="cursor:pointer; position:relative;">
      <svg class="icon" viewBox="0 0 24 24" title="Profile" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
      </svg>
      <div id="profileDropdown" style="display:none; position:absolute; right:0; top:25px; background:#F5F5DC; color:#000; border-radius:4px; box-shadow:0 0 8px rgba(0,0,0,0.2);">
        <button id="signInBtn" style="width:100%; padding:10px; border:none; background:none; cursor:pointer;">Sign In</button>
        <button id="signOutBtn" style="width:100%; padding:10px; border:none; background:none; cursor:pointer; display:none;">Sign Out</button>
      </div>
    </div>
  </div>
</header>

<main>
  <section id="home-section" class="section active">
    <h2>YGyML</h2>
    <img src="https://images.unsplash.com/photo-1596215432304-0c8a8f7d0b07" alt="Gym Equipment" class="gym-image" />
  </section>

  <section id="meal-section" class="section">
    <h2>Meal Plan</h2>
    <button class="meal-option" data-plan="lose">Lose Fat</button>
    <button class="meal-option" data-plan="gain">Gain Fat</button>
    <button class="meal-option" data-plan="build">Build Muscle</button>
    <div id="mealPlanDetails"></div>
    <button class="home-icon" data-section="home" title="Home">🏠</button>
  </section>

  <section id="workout-section" class="section">
    <h2>Workout Plan</h2>
    <button class="workout-option" data-type="lose">Lose Fat</button>
    <button class="workout-option" data-type="gain">Gain Muscle</button>
    <div id="workoutDetails"></div>
    <button class="home-icon" data-section="home" title="Home">🏠</button>
  </section>

  <section id="training-posts-section" class="section">
    <h2>Training Posts</h2>
    <div class="post" id="post1">
      <h3>Post 1: Workout Tips</h3>
    </div>
    <div class="post" id="post2">
      <h3>Post 2: Nutrition Advice</h3>
    </div>
    <button class="home-icon" data-section="home" title="Home">🏠</button>
  </section>

  <div id="training-guide"></div>
  <div id="daily-plan"></div>
</main>

<script>
const sections = document.querySelectorAll('.section');
document.querySelectorAll('.home-icon').forEach(btn => {
  btn.onclick = () => {
    sections.forEach(sec => sec.classList.remove('active'));
    document.getElementById('home-section').classList.add('active');
  };
});
const profileIcon = document.getElementById('profileIcon');
const profileDropdown = document.getElementById('profileDropdown');
profileIcon.onclick = () => {
  profileDropdown.style.display = profileDropdown.style.display === 'block' ? 'none' : 'block';
};
const signInBtn = document.getElementById('signInBtn');
const signOutBtn = document.getElementById('signOutBtn');
signInBtn.onclick = () => {
  alert('Signed in!');
  signInBtn.style.display = 'none';
  signOutBtn.style.display = 'block';
};
signOutBtn.onclick = () => {
  if (confirm('Sign out?')) {
    alert('Signed out!');
    signInBtn.style.display = 'block';
    signOutBtn.style.display = 'none';
  }
};

document.querySelectorAll('.meal-option').forEach(btn => {
  btn.onclick = () => {
    const data = {
      'lose': {
        title: 'Lose Fat Plan',
        description: 'Eat a calorie deficit diet with lean proteins, vegetables, and drink plenty of water.',
        meals: ['Grilled Chicken Salad', 'Steamed Vegetables', 'Fresh Fruit'],
        drinks: ['Water', 'Green Tea']
      },
      'gain': {
        title: 'Gain Muscle Plan',
        description: 'Eat a calorie surplus with protein-rich foods, carbs, and healthy fats.',
        meals: ['Oatmeal with Nuts', 'Grilled Salmon with Rice', 'Protein Shake'],
        drinks: ['Milk', 'Smoothies']
      },
      'build': {
        title: 'Build Muscle Plan',
        description: 'Focus on high-protein foods and complex carbs to support muscle growth.',
        meals: ['Egg Omelette', 'Chicken Breast with Quinoa', 'Greek Yogurt'],
        drinks: ['Protein Shake', 'Water']
      }
    }[btn.dataset.plan];
    document.getElementById('mealPlanDetails').innerHTML = `
      <h3>${data.title}</h3>
      <p>${data.description}</p>
      <h4>Sample Meals:</h4>
      <ul>${data.meals.map(m => `<li>${m}</li>`).join('')}</ul>
      <h4>Sample Drinks:</h4>
      <ul>${data.drinks.map(d => `<li>${d}</li>`).join('')}</ul>
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" alt="${data.title}" style="width:100%;max-width:400px;border-radius:8px; margin-top:10px;" />
    `;
  };
});

document.querySelectorAll('.workout-option').forEach(btn => {
  btn.onclick = () => {
    const type = btn.dataset.type;
    const data = {
      'lose': {
        title: 'Lose Fat Workout',
        description: 'Focus on cardio and high-intensity interval training.',
        exercises: ['Running', 'Jump Rope', 'Cycling']
      },
      'gain': {
        title: 'Gain Muscle Workout',
        description: 'Strength training with weights and resistance exercises.',
        exercises: ['Squats', 'Deadlifts', 'Bench Press']
      }
    }[type];
    document.getElementById('workoutDetails').innerHTML = `
      <h3>${data.title}</h3>
      <p>${data.description}</p>
      <h4>Sample Exercises:</h4>
      <ul>${data.exercises.map(e => `<li>${e}</li>`).join('')}</ul>
      <img src="https://images.unsplash.com/photo-1571019613449-7ae0f0a5f6b0" alt="${data.title}" style="width:100%;max-width:400px;border-radius:8px; margin-top:10px;" />
    `;
  };
});
document.querySelector('.workout-option[data-type="gain"]').onclick = () => {
  document.getElementById('training-guide').innerHTML = `
    <h2>Gain Muscle Training Guide</h2>
    <h3>Target Muscles and Exercises</h3>
    <h4>Chest</h4>
    <ul>
      <li>Barbell Bench Press</li>
      <img src="https://images.unsplash.com/photo-1571019613449-7ae0f0a5f6b0" class="exercise-img" alt="Barbell Bench Press"/>
      <li>Incline Dumbbell Press</li>
      <img src="https://images.unsplash.com/photo-1612831455540-5b0a3dceba3b" class="exercise-img" alt="Incline Dumbbell Press"/>
      <li>Chest Flyes</li>
      <img src="https://images.unsplash.com/photo-1571019613449-7ae0f0a5f6b0" class="exercise-img" alt="Chest Flyes"/>
    </ul>
    <h4>Back</h4>
    <ul>
      <li>Pull-Ups</li>
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" class="exercise-img" alt="Pull-Ups"/>
      <li>Deadlifts</li>
      <img src="https://images.unsplash.com/photo-1571019613449-7ae0f0a5f6b0" class="exercise-img" alt="Deadlifts"/>
      <li>Rows</li>
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" class="exercise-img" alt="Rows"/>
    </ul>
    <h4>Legs</h4>
    <ul>
      <li>Squats</li>
      <img src="https://images.unsplash.com/photo-1571019613449-7ae0f0a5f6b0" class="exercise-img" alt="Squats"/>
      <li>Leg Press</li>
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" class="exercise-img" alt="Leg Press"/>
      <li>Leg Curls</li>
      <img src="https://images.unsplash.com/photo-1571019613449-7ae0f0a5f6b0" class="exercise-img" alt="Leg Curls"/>
    </ul>
    <h4>Shoulders</h4>
    <ul>
      <li>Overhead Press</li>
      <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" class="exercise-img" alt="Overhead Press"/>
      <li>Lateral Raises</li>
      <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" class="exercise-img" alt="Lateral Raises"/>
      <li>Front Raises</li>
      <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" class="exercise-img" alt="Front Raises"/>
    </ul>
    <h4>Arms</h4>
    <ul>
      <li>Bicep Curls</li>
      <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" class="exercise-img" alt="Bicep Curls"/>
      <li>Tricep Extensions</li>
      <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" class="exercise-img" alt="Tricep Extensions"/>
      <li>Hammer Curls</li>
      <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" class="exercise-img" alt="Hammer Curls"/>
    </ul>
    <p>Remember to rest adequately and eat enough protein (~1.6-2.2g per kg of body weight) for muscle growth.</p>
  `;
};
</script>
</body>
</html>
